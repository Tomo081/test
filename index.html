<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GPS AR Coil</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; gpsMinDistance: 5;"
    >
      <a-camera gps-camera rotation-reader></a-camera>

      <a-entity
        id="magnemite"
        gltf-model="./assets/magnemite/scene.gltf"
        scale="0.5 0.5 0.5"
        rotation="0 180 0"
      >
      </a-entity>
    </a-scene>

    <script>
      window.onload = () => {
        // 現在地を取得
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // 少しだけ座標をずらす（自分と重ならないように北へ約10m）
            const targetLat = lat + 0.0001; 
            const targetLng = lng;

            const entity = document.querySelector('#magnemite');
            entity.setAttribute('gps-entity-place', `latitude: ${targetLat}; longitude: ${targetLng};`);
            
            console.log(`設置完了: ${targetLat}, ${targetLng}`);
          },
          (err) => {
            alert("位置情報が取得できませんでした。設定を確認してください。");
          },
          { enableHighAccuracy: true }
        );
      };
    </script>
  </body>
</html>
