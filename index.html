<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Location AR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; gpsMinDistance: 5;"
    >
      <!-- カメラ（位置情報を取得） -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- コイル（Magnemite） -->
      <a-entity
        gltf-model="./assets/magnemite/scene.gltf"
        scale="0.2 0.2 0.2"
        rotation="0 180 0"
        gps-entity-place="latitude: 35.625; longitude: 139.243;"
      >
      </a-entity>
    </a-scene>
  </body>
</html>
