<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Location AR - Current Location</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; gpsMinDistance: 5;"
    >
      <a-camera gps-camera rotation-reader></a-camera>

      <a-entity
        id="magnemite"
        gltf-model="./assets/magnemite"
        scale="0.2 0.2 0.2"
        rotation="0 180 0"
      >
      </a-entity>
    </a-scene>

    <script>
      // 1. ユーザーの現在地を取得する
      window.onload = () => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            // 2. 成功したら緯度と経度を取り出す
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // 3. コイルのエンティティを取得し、場所を設定する
            const magnemite = document.querySelector('#magnemite');
            magnemite.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
            
            console.log(`設置完了！ 緯度: ${lat}, 経度: ${lng}`);
            alert("あなたの足元にコイルを設置しました！");
          },
          (err) => {
            console.error("位置情報の取得に失敗しました", err);
            alert("位置情報の利用を許可してください。");
          },
          { enableHighAccuracy: true } // 精度を高くする設定
        );
      };
    </script>
  </body>
</html>
