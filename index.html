<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Location-based AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-at-model.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-camera gps-camera rotation-reader></a-camera>

      <a-entity
        id="magnemite"
        gltf-model="./assets/magnemite/scene.gltf"
        scale="0.1 0.1 0.1"
        visible="false"
        look-at="[gps-camera]"
      >
      </a-entity>
    </a-scene>

    <script>
      window.onload = () => {
        // 現在地を一度だけ取得してモデルを配置
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // 重要：自分と全く同じ場所だと見えないため、北に少し（約5~10m）ずらす
            const offset = 0.00005; 
            const targetLat = lat + offset;
            const targetLng = lng;

            const model = document.querySelector('#magnemite');
            
            // 位置を設定
            model.setAttribute('gps-entity-place', `latitude: ${targetLat}; longitude: ${targetLng};`);
            
            // モデルが読み込まれたら表示
            model.addEventListener('model-loaded', () => {
              model.setAttribute('visible', 'true');
              console.log("モデルの読み込みと配置が完了しました");
            });
          },
          (err) => {
            console.error("GPSの取得に失敗:", err);
            alert("GPSをオンにして、位置情報の利用を許可してください。");
          },
          { enableHighAccuracy: true }
        );
      };
    </script>
  </body>
</html>
